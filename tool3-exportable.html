        const FACTORS = {
            'A. KNOWLEDGE': ['Education', 'Work Experience', 'Professional Qualification', 'Industry Specific Knowledge'],
            'B. COMPETENCIES': ['Planning & Organizing', 'Problem Solving & Decision Making', 'Leadership', 'Innovation', 'Communication', 'Customer Focus', 'Business Acumen'],
            'C. DUTIES & RESPONSIBILITIES': ['Scope of Work', 'Impact on End Results', 'Complexity of Work', 'Revenue Contribution', 'Contribution to Product Delivery', 'Control of Financial Resources', 'Management of Human Resources', 'Process Management'],
            'D. ACCOUNTABILITIES': ['Authority', 'Challenges', 'Presence', 'Conditions', 'Safety & Security', 'Compliance Standards']
        };

        const CLUSTER_RANGES = {
            'Specialist': { min: 1, max: 3 },
            'Generalist': { min: 4, max: 6 },
            'Lead': { min: 7, max: 9 },
            'Business Partner': { min: 10, max: 12 },
            'Strategic Partner': { min: 13, max: 15 },
            'Executive': { min: 16, max: 20 },
            'C-Suite': { min: 21, max: 25 }
        };

        function calculateJobGrade(ratings) {
            const allDims = Object.values(FACTORS).flat();
            const values = allDims.map(d => ratings[d] || 0).filter(v => v > 0);
            if (values.length === 0) return 0;
            const avg = values.reduce((a, b) => a + b) / values.length;
            return Math.round(avg * 5);
        }

        function getClusterFromGrade(grade) {
            for (const [cluster, range] of Object.entries(CLUSTER_RANGES)) {
                if (grade >= range.min && grade <= range.max) return cluster;
            }
            return 'Specialist';
        }

        function getInterventionPlan(gaps) {
            const interventions = [];
            const L1Gaps = gaps.filter(g => g.gap === 1);
            const L2Gaps = gaps.filter(g => g.gap === 2);
            const L3PlusGaps = gaps.filter(g => g.gap >= 3);

            if (L3PlusGaps.length > 0) {
                interventions.push({
                    type: 'Formal Training',
                    desc: 'Enroll in formal training programs to build foundational and advanced skills'
                });
                interventions.push({
                    type: 'Job Orientation',
                    desc: 'Structured onboarding and immersion program to understand role requirements and organizational context'
                });
                interventions.push({
                    type: 'Coaching & Mentoring',
                    desc: 'Assign experienced mentor/coach for personalized guidance and accountability'
                });
                interventions.push({
                    type: 'Stretch Assignments',
                    desc: 'Carefully scoped challenging projects to build competence in gap areas'
                });
            } else if (L2Gaps.length > 0) {
                interventions.push({
                    type: 'Coaching & Mentoring',
                    desc: 'Personalized coaching to accelerate development'
                });
                interventions.push({
                    type: 'Formal Training',
                    desc: 'Targeted training programs for specific competencies'
                });
            } else if (L1Gaps.length > 0) {
                interventions.push({
                    type: 'Job Orientation',
                    desc: 'Light orientation and on-the-job training'
                });
            }

            return interventions;
        }

        function exportToPDF(positionName, personName, jobGrade, personGrade, report, interventions) {
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.fontFamily = 'Arial, sans-serif';
            element.style.fontSize = '12px';
            element.style.color = '#333';

            element.innerHTML = `
                <h1 style="text-align: center; color: #6B4C9A;">SCM Tool 3: Job Alignment Report</h1>
                <p style="text-align: center; font-size: 14px;">Date: ${new Date().toLocaleDateString()}</p>
                
                <hr/>
                
                <h2>Assessment Overview</h2>
                <p><strong>Position:</strong> ${positionName || 'N/A'}</p>
                <p><strong>Person:</strong> ${personName || 'N/A'}</p>
                
                <h2>Job Grade Assessment</h2>
                <p><strong>Role Requires (JG):</strong> ${jobGrade}</p>
                <p><strong>Person Assessed (JG):</strong> ${personGrade}</p>
                <p><strong>Status:</strong> ${personGrade >= jobGrade ? 'READY' : 'DEVELOPMENT NEEDED'}</p>
                
                <h2>Alignment Summary</h2>
                <p><strong>Aligned Dimensions:</strong> ${report.aligned}</p>
                <p><strong>Development Gaps:</strong> ${report.gaps.length}</p>
                <p><strong>Strengths Beyond Role:</strong> ${report.positives.length}</p>
                
                ${report.gaps.length > 0 ? `
                    <h2>Development Gaps</h2>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr style="background: #f0f0f0;">
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Dimension</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Required</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Current</th>
                            <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Gap</th>
                        </tr>
                        ${report.gaps.map(g => `
                            <tr>
                                <td style="border: 1px solid #ddd; padding: 8px;">${g.dim}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">L${g.job}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">L${g.person || '—'}</td>
                                <td style="border: 1px solid #ddd; padding: 8px;">${g.gap}</td>
                            </tr>
                        `).join('')}
                    </table>
                ` : ''}
                
                ${interventions.length > 0 ? `
                    <h2>Recommended Interventions</h2>
                    ${interventions.map(int => `
                        <p><strong>${int.type}:</strong> ${int.desc}</p>
                    `).join('')}
                ` : ''}
                
                <hr/>
                <p style="text-align: center; font-size: 10px; color: #999;">Generated by SCM Tool 3 - Job Alignment & Development Planning</p>
            `;

            const opt = {
                margin: 10,
                filename: `${positionName}-${personName}-Assessment.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            html2pdf().set(opt).from(element).save();
        }

        function handlePrint() {
            window.print();
        }

        function handleEmail(positionName, personName, jobGrade, personGrade, report) {
            const subject = `Job Alignment Report: ${positionName} - ${personName}`;
            const body = `
Job Alignment Assessment Report

Position: ${positionName}
Person: ${personName}

Job Grade: ${jobGrade} (Required) vs ${personGrade} (Assessed)
Status: ${personGrade >= jobGrade ? 'READY FOR ROLE' : 'DEVELOPMENT NEEDED'}

Alignment Summary:
- Aligned Dimensions: ${report.aligned}
- Development Gaps: ${report.gaps.length}
- Strengths Beyond Role: ${report.positives.length}

Generated by SCM Tool 3 - Job Alignment & Development Planning
${new Date().toLocaleDateString()}

For full details, open the attached PDF report.
            `.trim();

            const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.location.href = mailtoLink;
        }

        function Tool3() {
            const [step, setStep] = useState('setup');
            const [positionName, setPositionName] = useState('');
            const [personName, setPersonName] = useState('');
            const [cluster, setCluster] = useState('Generalist');
            const [jobRatings, setJobRatings] = useState({});
            const [personRatings, setPersonRatings] = useState({});
            const [jobGrade, setJobGrade] = useState(0);
            const [personGrade, setPersonGrade] = useState(0);

            const allDimensions = Object.values(FACTORS).flat();

            const setRating = (dim, level, type) => {
                if (type === 'job') {
                    setJobRatings({...jobRatings, [dim]: level});
                } else {
                    setPersonRatings({...personRatings, [dim]: level});
                }
            };

            const handleJobEvalComplete = () => {
                const grade = calculateJobGrade(jobRatings);
                setJobGrade(grade);
                setStep('jobGradeReview');
            };

            const handleProceedToPerson = () => {
                setStep('person');
            };

            const handlePersonEvalComplete = () => {
                const pGrade = calculateJobGrade(personRatings);
                setPersonGrade(pGrade);
                setStep('personGradeReview');
            };

            const calculateReport = () => {
                let aligned = 0, gaps = [], positives = [];
                allDimensions.forEach(dim => {
                    const jobLevel = jobRatings[dim] || 0;
                    const personLevel = personRatings[dim] || 0;
                    if (personLevel >= jobLevel) {
                        aligned++;
                        if (personLevel > jobLevel) {
                            positives.push({
                                dim: dim,
                                job: jobLevel,
                                person: personLevel,
                                above: personLevel - jobLevel
                            });
                        }
                    } else {
                        gaps.push({
                            dim: dim,
                            job: jobLevel,
                            person: personLevel,
                            gap: jobLevel - personLevel
                        });
                    }
                });
                return { aligned, gaps, positives, total: allDimensions.length };
            };

            const report = calculateReport();
            const interventions = getInterventionPlan(report.gaps);
            const isReady = report.gaps.length === 0;
            const isOverqualified = personGrade > jobGrade;

            return (
                <div className="container">
                    <div className="header">
                        <h1>📊 SCM Tool 3</h1>
                        <p>Job Alignment & Development Planning</p>
                    </div>

                    {step !== 'setup' && (
                        <div className="tabs">
                            <button className={`tab-btn ${step === 'setup' ? 'active' : ''}`} disabled>⚙️ Setup</button>
                            <button className={`tab-btn ${step.includes('job') ? 'active' : ''}`} disabled>📋 Job Eval</button>
                            <button className={`tab-btn ${step.includes('person') ? 'active' : ''}`} disabled>👤 Person Eval</button>
                            <button className={`tab-btn ${step === 'report' ? 'active' : ''}`} disabled>📈 Dev Plan</button>
                        </div>
                    )}

                    {step === 'setup' && (
                        <div className="setup-section">
                            <h2>Setup</h2>
                            <div className="form-group">
                                <label>Position Name</label>
                                <input type="text" placeholder="e.g., Procurement Manager" value={positionName} onChange={(e) => setPositionName(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Person Name</label>
                                <input type="text" placeholder="e.g., Maria Santos" value={personName} onChange={(e) => setPersonName(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Job Cluster</label>
                                <select value={cluster} onChange={(e) => setCluster(e.target.value)}>
                                    {Object.keys(CLUSTER_RANGES).map(c => <option key={c}>{c}</option>)}
                                </select>
                            </div>
                            <button className="next-btn" onClick={() => setStep('job')}>Start Job Evaluation →</button>
                        </div>
                    )}

                    {step === 'job' && (
                        <div>
                            <h2>Job Evaluation: {positionName || 'Position'}</h2>
                            <div className="dimensions-section">
                                {Object.entries(FACTORS).map(([factor, dims]) => (
                                    <div key={factor} className="factor">
                                        <div className="factor-title">{factor}</div>
                                        {dims.map(dim => (
                                            <div key={dim} className="dimension">
                                                <div className="dimension-name">{dim}</div>
                                                <div className="level-options">
                                                    {(DESCRIPTIONS[dim] || []).map(opt => (
                                                        <button key={opt.level} className={`level-btn ${jobRatings[dim] === opt.level ? 'selected' : ''}`} onClick={() => setRating(dim, opt.level, 'job')}>
                                                            <div className="level-label">L{opt.level}: {opt.label}</div>
                                                            <div className="level-desc">{opt.desc}</div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                            <button className="next-btn" onClick={handleJobEvalComplete}>Complete Job Evaluation →</button>
                        </div>
                    )}

                    {step === 'jobGradeReview' && (
                        <div>
                            <div className="grade-panel required">
                                <div className="grade-value">JG {jobGrade}</div>
                                <div className="grade-label">Job Grade Required</div>
                                <div className="grade-cluster">Cluster: {getClusterFromGrade(jobGrade)}</div>
                            </div>
                            <div className="setup-section" style={{textAlign: 'center'}}>
                                <p style={{marginBottom: '20px', fontSize: '16px'}}>Job evaluation complete! Now evaluate {personName || 'the person'} against these requirements.</p>
                                <button className="next-btn" onClick={handleProceedToPerson}>Proceed to Person Evaluation →</button>
                            </div>
                        </div>
                    )}

                    {step === 'person' && (
                        <div>
                            <h2>Person Evaluation: {personName || 'Person'}</h2>
                            <div className="dimensions-section">
                                {Object.entries(FACTORS).map(([factor, dims]) => (
                                    <div key={factor} className="factor">
                                        <div className="factor-title">{factor}</div>
                                        {dims.map(dim => (
                                            <div key={dim} className="dimension">
                                                <div className="dimension-name">{dim}</div>
                                                <div className="level-options">
                                                    {(DESCRIPTIONS[dim] || []).map(opt => (
                                                        <button key={opt.level} className={`level-btn ${personRatings[dim] === opt.level ? 'selected' : ''}`} onClick={() => setRating(dim, opt.level, 'person')}>
                                                            <div className="level-label">L{opt.level}: {opt.label}</div>
                                                            <div className="level-desc">{opt.desc}</div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                            <button className="next-btn" onClick={handlePersonEvalComplete}>Complete Person Evaluation →</button>
                        </div>
                    )}

                    {step === 'personGradeReview' && (
                        <div>
                            <h2 style={{marginBottom: '20px'}}>Person's Job Grade Assessment</h2>
                            <div className="grade-comparison">
                                <div className="grade-panel required">
                                    <div className="grade-value">JG {jobGrade}</div>
                                    <div className="grade-label">Role Requires</div>
                                    <div className="grade-cluster">{getClusterFromGrade(jobGrade)}</div>
                                </div>
                                <div className={`grade-panel person ${personGrade < jobGrade ? 'below' : ''}`}>
                                    <div className="grade-value">JG {personGrade}</div>
                                    <div className="grade-label">{personName || 'Person'} Assessed</div>
                                    <div className="grade-cluster">{getClusterFromGrade(personGrade)}</div>
                                </div>
                            </div>

                            {isReady && (
                                <div className="status-banner ready">
                                    ✓ READY NOW - {personName || 'Person'} is fully qualified
                                </div>
                            )}
                            {!isReady && personGrade >= jobGrade && (
                                <div className="status-banner ready">
                                    ✓ READY NOW - {personName || 'Person'} meets or exceeds requirements
                                </div>
                            )}
                            {personGrade < jobGrade && (
                                <div className="status-banner gaps">
                                    ⚠ DEVELOPMENT NEEDED - {report.gaps.length} area(s) need focus
                                </div>
                            )}
                            {isOverqualified && (
                                <div className="status-banner overqualified">
                                    ⭐ OVERQUALIFIED - Promotion candidate
                                </div>
                            )}

                            <div className="setup-section" style={{textAlign: 'center', marginTop: '20px'}}>
                                <p style={{marginBottom: '20px', fontSize: '16px'}}>Ready to view the development plan?</p>
                                <button className="next-btn" onClick={() => setStep('report')}>View Development Plan →</button>
                            </div>
                        </div>
                    )}

                    {step === 'report' && (
                        <div className="report-section" id="report-content">
                            <h2>Alignment Analysis & Development Planning</h2>
                            <div className="grade-comparison">
                                <div className="grade-panel required">
                                    <div className="grade-value">JG {jobGrade}</div>
                                    <div className="grade-label">Role Requires</div>
                                </div>
                                <div className={`grade-panel person ${personGrade < jobGrade ? 'below' : ''}`}>
                                    <div className="grade-value">JG {personGrade}</div>
                                    <div className="grade-label">{personName || 'Person'} Assessed</div>
                                </div>
                            </div>

                            {isReady && (
                                <div className="status-banner ready">
                                    ✓ READY NOW - {personName || 'Person'} is fully qualified
                                </div>
                            )}
                            {!isReady && personGrade < jobGrade && (
                                <div className="status-banner gaps">
                                    ⚠ DEVELOPMENT NEEDED - Focus on {report.gaps.length} area(s)
                                </div>
                            )}
                            {isOverqualified && (
                                <div className="status-banner overqualified">
                                    ⭐ OVERQUALIFIED - Promotion candidate
                                </div>
                            )}

                            <div className="summary-cards" style={{marginTop: '30px'}}>
                                <div className="card aligned">
                                    <h3>Aligned Dimensions</h3>
                                    <div className="card-value">🟢 {report.aligned}</div>
                                </div>
                                {report.gaps.length > 0 && (
                                    <div className="card gap">
                                        <h3>Development Gaps</h3>
                                        <div className="card-value">🔴 {report.gaps.length}</div>
                                    </div>
                                )}
                                {report.positives.length > 0 && (
                                    <div className="card positive">
                                        <h3>Strengths Beyond Role</h3>
                                        <div className="card-value">⭐ {report.positives.length}</div>
                                    </div>
                                )}
                            </div>

                            {report.gaps.length > 0 && (
                                <div className="gap-list">
                                    <h4>Dimensions Requiring Development</h4>
                                    {report.gaps.map((g, i) => (
                                        <div key={i} className="gap-item">
                                            <strong>{g.dim}</strong>
                                            <span className={`gap-severity ${g.gap >= 3 ? 'critical' : g.gap === 2 ? 'moderate' : 'minor'}`}>
                                                {g.gap >= 3 ? 'CRITICAL' : g.gap === 2 ? 'MODERATE' : 'MINOR'}
                                            </span>
                                            <br/>Required: L{g.job} | Current: L{g.person || '—'} | Gap: {g.gap} level(s)
                                        </div>
                                    ))}
                                </div>
                            )}

                            {report.positives.length > 0 && (
                                <div className="positive-list">
                                    <h4>Strengths Beyond Role (Advancement Indicators)</h4>
                                    {report.positives.map((p, i) => (
                                        <div key={i} className="positive-item">
                                            <strong>{p.dim}</strong>
                                            <br/>Role Requires: L{p.job} | Person Has: L{p.person} | Exceeds by: {p.above} level(s)
                                        </div>
                                    ))}
                                </div>
                            )}

                            {report.gaps.length > 0 && (
                                <div className="intervention-plan">
                                    <h3>✓ Recommended Intervention Plan</h3>
                                    {interventions.map((int, i) => (
                                        <div key={i} className="intervention-item">
                                            <div className="intervention-label">{int.type}</div>
                                            <div className="intervention-desc">{int.desc}</div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {isReady && (
                                <div className="intervention-plan">
                                    <h3>✓ Ready for Role</h3>
                                    <p style={{fontSize: '14px', color: '#166534'}}>All dimensions are aligned. {personName || 'Person'} is ready for {positionName || 'the position'} immediately.</p>
                                </div>
                            )}

                            <div className="export-buttons">
                                <button className="export-btn pdf" onClick={() => exportToPDF(positionName, personName, jobGrade, personGrade, report, interventions)}>
                                    📄 Save as PDF
                                </button>
                                <button className="export-btn print" onClick={handlePrint}>
                                    🖨️ Print Report
                                </button>
                                <button className="export-btn email" onClick={() => handleEmail(positionName, personName, jobGrade, personGrade, report)}>
                                    📧 Send to Email
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Tool3 />);
    </script>
</body>
</html>
