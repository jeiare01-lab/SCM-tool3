<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM Tool 3: Comparison Report</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #374151; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #6B4C9A 0%, #D4AF37 100%); color: white; padding: 40px 20px; text-align: center; margin-bottom: 40px; border-radius: 8px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; background: #e5e7eb; color: #374151; }
        .tab-btn.active { background: #6B4C9A; color: white; }
        .tab-btn:hover { background: #d1d5db; }
        .tab-btn.active:hover { background: #5a3f87; }
        .setup-section { background: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #e5e7eb; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1f2937; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #6B4C9A; box-shadow: 0 0 0 3px rgba(107, 76, 154, 0.1); }
        .dimensions-section { display: grid; gap: 20px; }
        .factor { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .factor-title { font-size: 16px; font-weight: 700; color: #1f2937; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .factor-title:hover { color: #6B4C9A; }
        .dimensions { display: grid; gap: 15px; }
        .dimension { padding: 15px; background: #f9fafb; border-radius: 6px; border-left: 4px solid #2563EB; }
        .dimension-name { font-weight: 600; color: #1f2937; margin-bottom: 10px; font-size: 14px; }
        .levels { display: flex; gap: 8px; flex-wrap: wrap; }
        .level-btn { padding: 8px 12px; border: 2px solid #d1d5db; background: white; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
        .level-btn:hover { border-color: #6B4C9A; }
        .level-btn.selected { background: #6B4C9A; color: white; border-color: #6B4C9A; }
        .report-section { background: white; padding: 30px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 8px; text-align: center; }
        .card.aligned { background: #dbeafe; border: 2px solid #2563EB; }
        .card.gap { background: #fee2e2; border: 2px solid #dc2626; }
        .card h3 { margin-bottom: 10px; font-size: 14px; color: #374151; }
        .card-value { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .card.aligned .card-value { color: #2563EB; }
        .card.gap .card-value { color: #dc2626; }
        .button { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .button-primary { background: #6B4C9A; color: white; }
        .button-primary:hover { background: #5a3f87; }
        .gap-list { margin-top: 20px; padding: 20px; background: #fef2f2; border-left: 4px solid #dc2626; border-radius: 6px; }
        .gap-list h4 { color: #991b1b; margin-bottom: 10px; }
        .gap-item { padding: 10px; background: white; border-radius: 4px; margin-bottom: 8px; font-size: 13px; }
        .no-data { text-align: center; padding: 40px 20px; color: #6b7280; }
        h2 { margin-bottom: 20px; font-size: 20px; }
        @media (max-width: 768px) {
            .header h1 { font-size: 24px; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const CLUSTERS = ['Specialist', 'Generalist', 'Lead', 'Business Partner', 'Strategic Partner', 'Executive', 'C-Suite'];
        
        const FACTORS = {
            'Know-How': ['Education', 'Work Experience', 'Professional Qualifications', 'Industry Knowledge'],
            'Competencies': ['Planning & Organizing', 'Decision Making', 'Leadership', 'Innovation', 'Communication', 'Customer Focus', 'Business Acumen'],
            'Duties & Responsibilities': ['Scope of Work', 'Impact on Results', 'Complexity', 'Revenue Contribution', 'Product Delivery', 'Financial Resources', 'Human Resources', 'Process Management'],
            'Working Authority': ['Representation', 'Challenges', 'Presence', 'Working Conditions', 'Safety & Security', 'Compliance']
        };

        function Tool3() {
            const [activeTab, setActiveTab] = useState('setup');
            const [positionName, setPositionName] = useState('');
            const [personName, setPersonName] = useState('');
            const [cluster, setCluster] = useState('Generalist');
            const [jobRatings, setJobRatings] = useState({});
            const [personRatings, setPersonRatings] = useState({});

            const allDimensions = Object.values(FACTORS).flat();

            const setRating = (dim, level, type) => {
                if (type === 'job') {
                    setJobRatings({...jobRatings, [dim]: level});
                } else {
                    setPersonRatings({...personRatings, [dim]: level});
                }
            };

            const calculateReport = () => {
                let aligned = 0, gaps = 0;
                allDimensions.forEach(dim => {
                    const jobLevel = jobRatings[dim] || 0;
                    const personLevel = personRatings[dim] || 0;
                    if (personLevel >= jobLevel) aligned++;
                    if (personLevel < jobLevel) gaps++;
                });
                return { aligned, gaps, total: allDimensions.length };
            };

            const report = calculateReport();

            return (
                <div className="container">
                    <div className="header">
                        <h1>📊 SCM Tool 3</h1>
                        <p>Alignment Comparison Report</p>
                    </div>

                    <div className="tabs">
                        <button className={`tab-btn ${activeTab === 'setup' ? 'active' : ''}`} onClick={() => setActiveTab('setup')}>
                            ⚙️ Setup
                        </button>
                        <button className={`tab-btn ${activeTab === 'job' ? 'active' : ''}`} onClick={() => setActiveTab('job')}>
                            📋 Job Evaluation
                        </button>
                        <button className={`tab-btn ${activeTab === 'person' ? 'active' : ''}`} onClick={() => setActiveTab('person')}>
                            👤 Person Evaluation
                        </button>
                        <button className={`tab-btn ${activeTab === 'report' ? 'active' : ''}`} onClick={() => setActiveTab('report')}>
                            📈 Report
                        </button>
                    </div>

                    {activeTab === 'setup' && (
                        <div className="setup-section">
                            <h2>Setup</h2>
                            <div className="form-group">
                                <label>Position Name</label>
                                <input type="text" placeholder="e.g., Procurement Manager" value={positionName} onChange={(e) => setPositionName(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Person Name</label>
                                <input type="text" placeholder="e.g., Maria Santos" value={personName} onChange={(e) => setPersonName(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>Job Cluster</label>
                                <select value={cluster} onChange={(e) => setCluster(e.target.value)}>
                                    {CLUSTERS.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                        </div>
                    )}

                    {activeTab === 'job' && (
                        <div>
                            <h2>Job Evaluation: {positionName || 'Position'}</h2>
                            <div className="dimensions-section">
                                {Object.entries(FACTORS).map(([factor, dims]) => (
                                    <div key={factor} className="factor">
                                        <div className="factor-title">{factor}</div>
                                        <div className="dimensions">
                                            {dims.map(dim => (
                                                <div key={dim} className="dimension">
                                                    <div className="dimension-name">{dim}</div>
                                                    <div className="levels">
                                                        {[1,2,3,4,5].map(level => (
                                                            <button key={level} className={`level-btn ${jobRatings[dim] === level ? 'selected' : ''}`} onClick={() => setRating(dim, level, 'job')}>
                                                                L{level}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'person' && (
                        <div>
                            <h2>Person Evaluation: {personName || 'Person'}</h2>
                            <div className="dimensions-section">
                                {Object.entries(FACTORS).map(([factor, dims]) => (
                                    <div key={factor} className="factor">
                                        <div className="factor-title">{factor}</div>
                                        <div className="dimensions">
                                            {dims.map(dim => (
                                                <div key={dim} className="dimension">
                                                    <div className="dimension-name">{dim}</div>
                                                    <div className="levels">
                                                        {[1,2,3,4,5].map(level => (
                                                            <button key={level} className={`level-btn ${personRatings[dim] === level ? 'selected' : ''}`} onClick={() => setRating(dim, level, 'person')}>
                                                                L{level}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'report' && (
                        <div className="report-section">
                            <h2>Comparison Report</h2>
                            {Object.keys(jobRatings).length === 0 ? (
                                <div className="no-data">Complete both job and person evaluations to see the report.</div>
                            ) : (
                                <>
                                    <div className="summary-cards">
                                        <div className="card aligned">
                                            <h3>Aligned Dimensions</h3>
                                            <div className="card-value">🟢 {report.aligned}</div>
                                            <p>Person meets or exceeds requirements</p>
                                        </div>
                                        <div className="card gap">
                                            <h3>Gaps Identified</h3>
                                            <div className="card-value">🔴 {report.gaps}</div>
                                            <p>Development opportunities</p>
                                        </div>
                                    </div>

                                    <div className="gap-list">
                                        <h4>Dimensions with Gaps</h4>
                                        {allDimensions.filter(dim => {
                                            const jobLevel = jobRatings[dim] || 0;
                                            const personLevel = personRatings[dim] || 0;
                                            return personLevel < jobLevel;
                                        }).length === 0 ? (
                                            <p>No gaps identified. Person is ready!</p>
                                        ) : (
                                            allDimensions.filter(dim => {
                                                const jobLevel = jobRatings[dim] || 0;
                                                const personLevel = personRatings[dim] || 0;
                                                return personLevel < jobLevel;
                                            }).map(dim => {
                                                const jobLevel = jobRatings[dim];
                                                const personLevel = personRatings[dim];
                                                return (
                                                    <div key={dim} className="gap-item">
                                                        <strong>{dim}</strong><br/>
                                                        Required: L{jobLevel} | Person: L{personLevel} | Gap: {jobLevel - personLevel} level(s)
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Tool3 />);
    </script>
</body>
</html>
